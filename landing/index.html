<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="MTwebs — portfolio and personal projects." />
    <meta name="author" content="Ing. Michal Tkáč" />
    <meta name="theme-color" content="#070b14" />
    <link rel="canonical" href="https://michaltkac.com/" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="MTwebs" />
    <meta property="og:description" content="Portfolio and personal projects." />
    <meta property="og:url" content="https://michaltkac.com/" />
    <meta property="og:site_name" content="MTwebs" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <title>MTwebs</title>
  </head>
  <body>
    <div class="page">
      <header class="header">
        <span class="logo">MT<span class="logo-accent">webs</span></span>
        <div class="header-actions">
          <button type="button" id="lang-toggle" class="icon-btn" aria-label="Toggle language">EN</button>
          <button type="button" id="theme-toggle" class="icon-btn icon-btn-square" aria-label="Toggle theme">
            <span id="theme-icon" aria-hidden="true">☀</span>
          </button>
        </div>
      </header>

      <main class="main">
        <div class="cards">
          <a href="/Portfolio/" class="card card-active">
            <span class="card-label" data-i18n="portfolio.label">Portfolio</span>
            <span class="card-desc" data-i18n="portfolio.desc">Work experience, projects, and CV</span>
            <span class="card-arrow" aria-hidden="true">→</span>
          </a>

          <a href="/valentinka/" class="card card-active">
            <span class="card-label" data-i18n="valentinka.label">Valentínka</span>
            <span class="card-desc" data-i18n="valentinka.desc">Interactive valentine mini web</span>
            <span class="card-arrow" aria-hidden="true">→</span>
          </a>
        </div>
      </main>
    </div>
    <script type="module" src="./src/main.ts"></script>
  </body>
</html>
